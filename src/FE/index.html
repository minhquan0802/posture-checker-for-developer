<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posture Checker - MediaPipe Tasks API</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            text-align: center;
            background-color: #f4f7f6;
            margin-top: 30px;
        }

        .video-container {
            position: relative;
            display: inline-block;
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            overflow: hidden;
            background-color: #000;
        }

        video {
            width: 640px;
            height: 480px;
            transform: scaleX(-1);
            display: block;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 640px;
            height: 480px;
            transform: scaleX(-1);
        }

        #status-board {
            margin-top: 20px;
            padding: 15px 30px;
            border-radius: 8px;
            display: inline-block;
            font-size: 24px;
            font-weight: bold;
        }

        .loading {
            background-color: #e0e0e0;
            color: #333;
        }

        .good {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .bad {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .debug-info {
            margin-top: 10px;
            font-family: monospace;
            color: #555;
        }

        /* POPUP */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }

        .popup-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .popup-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .popup-content h3 {
            margin-top: 0;
            color: #1f2937;
        }

        .popup-status {
            margin: 15px 0;
            font-size: 15px;
            color: #4b5563;
        }

        .popup-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .popup-actions button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            background: #e5e7eb;
            color: #374151;
            transition: 0.2s;
        }

        .popup-actions button:hover {
            background: #d1d5db;
        }

        .popup-actions button.primary {
            background: #6366f1;
            color: white;
        }

        .popup-actions button.primary:hover {
            background: #4f46e5;
        }

        .popup-actions button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <h2>Hệ Thống Phân Tích Tư Thế Ngồi (Local Model)</h2>

    <div class="video-container">
        <video id="input_video" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div>
        <div id="status-board" class="loading">Đang tải Model từ ổ cứng...</div>
        <div id="debug" class="debug-info">Đang chờ dữ liệu...</div>
        <!-- <div id="mui" class="debug-info">Mũi (landmarks[0]) : 0.00</div>
        <div id="VT" class="debug-info">Vai trái (landmarks[11]) : 0.00</div>
        <div id="VP" class="debug-info">Vai phải (landmarks[12]) : 0.00</div> -->
    </div>

    <div id="calibrationPopup" class="popup-overlay">
        <div class="popup-content">
            <h3>Chào mừng trở lại! 👋</h3>
            <p style="font-size: 14px; color: #666;">Hôm nay bạn ngồi ở vị trí mới hay vị trí cũ?</p>
            <div id="popupStatus" class="popup-status">
                Ngưỡng AI hiện tại: <strong id="currentThresholdDisplay" style="color: #2563eb;">0.54</strong>
            </div>
            <div class="popup-actions">
                <button id="btnRecalibratePopup" class="primary" onclick="startPopupCalibration()">
                    🎯 Hiệu chuẩn lại chỗ ngồi (5s)
                </button>
                <button id="btnKeepOldPopup" onclick="closePopup()">
                    ❌ Dùng ngưỡng cũ (Bỏ qua)
                </button>
            </div>
        </div>
    </div>

    <script type="module">

        if (Notification.permission !== "denied") {
            Notification.requestPermission();
        }

        // 1. Tải 3 file âm thanh của bạn (Nhớ đổi lại đường dẫn cho đúng với thư mục dự án)
        const audioLevel1 = new Audio('../../assets/canhbao_lan1.mp3');
        const audioLevel2 = new Audio('../../assets/canhbao_lan2.mp3');
        const audioLevel3 = new Audio('../../assets/canhbao_lan3.mp3');

        let isMuted = false;
        const { ipcRenderer } = require('electron');
        ipcRenderer.on('toggle-mute', (event, muteState) => { isMuted = muteState; });

        // 2. Các biến dùng để bấm giờ và cắm cờ
        let slouchStartTime = null; // Ghi nhớ thời điểm bắt đầu gù
        let hasPlayedLevel1 = false; // Cờ đánh dấu đã phát mức 1 chưa
        let hasPlayedLevel2 = false; // Cờ đánh dấu đã phát mức 2 chưa
        let hasPlayedLevel3 = false; // Cờ đánh dấu đã phát mức 3 chưa


        // 3. Hàm này sẽ được gọi liên tục khi phát hiện gù, nó sẽ kiểm tra đã đến mốc thời gian nào và phát âm thanh tương ứng
        function triggerPostureWarning(warningType, duration, warningValue) {
            // Làm tròn số giây vi phạm
            const durationSeconds = Math.floor(duration);

            // MỨC 1: Đạt 15s và CHƯA từng phát audio mức 1
            if (durationSeconds >= 15 && durationSeconds < 30 && !hasPlayedLevel1) {
                if (!isMuted) audioLevel1.play();
                hasPlayedLevel1 = true;
                // Truyền thêm warningType xuống hàm lưu DB
                sendLog(warningType, durationSeconds, warningValue);
            }
            // MỨC 2: Đạt 30s và CHƯA từng phát audio mức 2
            else if (durationSeconds >= 30 && durationSeconds < 45 && !hasPlayedLevel2) {
                if (!isMuted) audioLevel2.play();
                hasPlayedLevel2 = true;
                sendLog(warningType, durationSeconds, warningValue);
            }
            // MỨC 3: Đạt 45s và CHƯA từng phát audio mức 3
            else if (durationSeconds >= 45 && !hasPlayedLevel3) {
                if (!isMuted) audioLevel3.play();
                hasPlayedLevel3 = true;
                sendLog(warningType, durationSeconds, warningValue);
            }
        }

        // Hàm này sẽ gửi log về cho backend (main.js) để lưu vào SQLite ngầm dưới nền
        async function sendLog(warningType, durationSeconds, distanceValue) {
            if (!userInDb?.id) return;

            try {
                // Gọi thẳng xuống main.js qua kênh IPC
                const response = await ipcRenderer.invoke('api-save-log', {
                    userId: userInDb.id,
                    type: warningType, // 👈 Thêm dòng này để gửi loại lỗi (SAI_TU_THE hoặc LECH_VAI)
                    duration: durationSeconds,
                    distance: distanceValue
                });

                if (response.success) {
                    console.log(`✅ Đã ghi log [${warningType}] thành công vào DB:`, durationSeconds + "s");
                } else {
                    console.error("❌ Lỗi từ Backend:", response.message);
                }
            } catch (error) {
                console.error("❌ Lỗi giao tiếp IPC:", error);
            }
        }

        // 4. Hàm này sẽ được gọi khi người dùng ngồi thẳng trở lại, nó sẽ reset mọi thứ về ban đầu để sẵn sàng cho lần gù tiếp theo
        function resetPostureStatus() {
            // Người dùng ngồi thẳng -> Reset mọi thứ về số 0
            slouchStartTime = null;
            hasPlayedLevel1 = false;
            hasPlayedLevel2 = false;
            hasPlayedLevel3 = false;

            // (Tùy chọn) Tắt luôn âm thanh nếu nó đang rên rỉ dở dang
            audioLevel1.pause(); audioLevel1.currentTime = 0;
            audioLevel2.pause(); audioLevel2.currentTime = 0;
            audioLevel3.pause(); audioLevel3.currentTime = 0;
            statusBoard.innerText = "✅ Tư thế tốt. Hãy duy trì nhé!";
            statusBoard.className = "good";
        }

        let lastAlertTime = 0;



        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusBoard = document.getElementById('status-board');
        const debugText = document.getElementById('debug');
        const noseText = document.getElementById('mui');
        const leftShoulderText = document.getElementById('VT');
        const rightShoulderText = document.getElementById('VP');

        let poseLandmarker = undefined;
        let lastVideoTime = -1;
        const drawingUtils = new DrawingUtils(canvasCtx);

        // ----------------------------------------------------------------
        // NGƯỠNG GÙ LƯNG
        // normalizedDistance = khoảng cách Y (mũi→vai) / chiều rộng vai
        // Ngồi thẳng thường ~0.6–0.8 tùy camera → default 0.54
        // Sẽ được ghi đè sau khi calibrate
        // ----------------------------------------------------------------
        let currentThreshold = 0.54;
        let userInDb = JSON.parse(localStorage.getItem('currentUser'));
        if (userInDb && userInDb.threshold) {
            currentThreshold = userInDb.threshold;
            document.getElementById('currentThresholdDisplay').innerText = userInDb.threshold;
        }

        window.addEventListener('storage', () => {
            const updatedUser = JSON.parse(localStorage.getItem('currentUser'));
            if (updatedUser && updatedUser.threshold) {
                currentThreshold = updatedUser.threshold;
                console.log("AI nhận ngưỡng mới:", currentThreshold);
            }
        });

        // ----------------------------------------------------------------
        // POPUP HIỆU CHUẨN
        // ----------------------------------------------------------------
        let isPopupCalibrating = false;
        let popupCalibrationSamples = [];

        function closePopup() {
            document.getElementById('calibrationPopup').classList.add('hidden');
        }

        function startPopupCalibration() {
            const statusDiv = document.getElementById('popupStatus');
            const btnKeep = document.getElementById('btnKeepOldPopup');
            const btnRecal = document.getElementById('btnRecalibratePopup');

            isPopupCalibrating = true;
            popupCalibrationSamples = [];
            btnKeep.style.display = 'none';
            btnRecal.disabled = true;

            let countdown = 3;
            let timer = setInterval(() => {
                statusDiv.innerHTML = `<span style="color:#ef4444;font-weight:bold;">Hãy ngồi thẳng! Bắt đầu sau: ${countdown}s</span>`;
                countdown--;
                if (countdown < 0) {
                    clearInterval(timer);
                    statusDiv.innerHTML = `<span style="color:#10b981;font-weight:bold;">⚡ Đang lấy mẫu... (Giữ nguyên tư thế)</span>`;
                    setTimeout(() => { finishPopupCalibration(); }, 5000);
                }
            }, 1000);
        }

        function finishPopupCalibration() {
            isPopupCalibrating = false;

            if (popupCalibrationSamples.length < 10) {
                alert("Lỗi: Không đủ dữ liệu! Hãy đảm bảo camera thấy rõ đầu và vai của bạn.");
                document.getElementById('btnKeepOldPopup').style.display = '';
                document.getElementById('btnRecalibratePopup').disabled = false;
                return;
            }

            const average = popupCalibrationSamples.reduce((a, b) => a + b) / popupCalibrationSamples.length;

            if (isNaN(average) || average <= 0) {
                alert("Lỗi: Dữ liệu hiệu chuẩn không hợp lệ. Thử lại.");
                document.getElementById('btnKeepOldPopup').style.display = '';
                document.getElementById('btnRecalibratePopup').disabled = false;
                return;
            }

            // Ngồi thẳng average ~0.6–0.8 → threshold ~0.51–0.68
            const newThreshold = parseFloat((average * 0.85).toFixed(3));
            currentThreshold = newThreshold;

            const displayEl = document.getElementById('currentThresholdDisplay');
            if (displayEl) displayEl.innerText = newThreshold;

            if (userInDb) {
                // 1. Cập nhật trên RAM và LocalStorage (để dùng ngay)
                userInDb.threshold = newThreshold;
                localStorage.setItem('currentUser', JSON.stringify(userInDb));

                // 2. Bắn tín hiệu lưu xuống SQLite ngầm dưới nền
                ipcRenderer.invoke('api-update-threshold', {
                    userId: userInDb.id,
                    newThreshold: newThreshold
                })
                    .then(response => {
                        if (!response.success) console.log("Lỗi lưu DB ngầm:", response.message);
                    })
                    .catch(e => console.log("Lỗi gọi IPC lưu DB ngầm:", e));
            }

            alert("Đã cập nhật ngưỡng mới: " + newThreshold);
            closePopup();
        }

        window.closePopup = closePopup;
        window.startPopupCalibration = startPopupCalibration;

        // ----------------------------------------------------------------
        // KHỞI TẠO MODEL
        // ----------------------------------------------------------------


        import {
            PoseLandmarker,
            FilesetResolver,
            DrawingUtils
        } from "../../libs/mediapipe/vision_bundle.mjs";

        const createPoseLandmarker = async () => {
            const vision = await FilesetResolver.forVisionTasks("../../libs/mediapipe/wasm");
            poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "../../models/pose_landmarker_full.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO", // Chế độ xử lý video liên tục
                numPoses: 1 // Chỉ theo dõi 1 người duy nhất trong khung hình để tối ưu hiệu năng
            });
            statusBoard.innerText = "Model đã sẵn sàng! Đang mở camera...";
            startCamera();
        };

        function startCamera(retryCount = 0) {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then((stream) => {
                    videoElement.srcObject = stream;
                    videoElement.addEventListener("loadeddata", predictWebcam);
                })
                .catch((err) => {
                    console.error("Lỗi camera:", err);
                    if (retryCount < 3) {
                        console.log(`Thử lại lần ${retryCount + 1}...`);
                        setTimeout(() => startCamera(retryCount + 1), 1000);
                    } else {
                        statusBoard.innerText = "❌ Không thể mở camera. Hãy kiểm tra lại.";
                        statusBoard.className = "bad";
                    }
                });
        }

        // Dọn dẹp camera khi đóng/reload trang — tránh bị giữ camera
        window.addEventListener('beforeunload', () => {
            if (videoElement.srcObject) {
                videoElement.srcObject.getTracks().forEach(track => track.stop());
            }
        });

        // ----------------------------------------------------------------
        // VÒNG LẶP CHÍNH
        // ----------------------------------------------------------------
        async function predictWebcam() {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;

            const startTimeMs = performance.now();

            if (lastVideoTime !== videoElement.currentTime) {
                lastVideoTime = videoElement.currentTime;

                poseLandmarker.detectForVideo(videoElement, startTimeMs, (result) => {
                    canvasCtx.save();
                    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

                    // Xử lý dữ liệu trả về từ callback của MediaPipe
                    if (result.landmarks.length > 0) {
                        const landmarks = result.landmarks[0];

                        drawingUtils.drawLandmarks(landmarks, { radius: 3, color: '#FF0000' });
                        drawingUtils.drawConnectors(landmarks, PoseLandmarker.POSE_CONNECTIONS, { color: '#00FF00', lineWidth: 3 });

                        const nose = landmarks[0];
                        const leftShoulder = landmarks[11];
                        const rightShoulder = landmarks[12];

                        // ------------------------------------------------
                        // TÍNH CHIỀU RỘNG VAI ĐỂ LỌC GÓC KHUẤT
                        // ------------------------------------------------
                        const shoulderWidth = Math.abs(leftShoulder.x - rightShoulder.x);

                        if (shoulderWidth < 0.05) {
                            // Người đang xoay ngang, bỏ qua frame này
                            statusBoard.innerText = "↔️ Hãy nhìn thẳng vào camera";
                            statusBoard.className = "loading";
                        } else {
                            // ------------------------------------------------
                            // TÍNH TOÁN 2 CHỈ SỐ CỐT LÕI
                            // ------------------------------------------------
                            // 1. Chỉ số Cúi/Gù (Khoảng cách Mũi -> Trung điểm Vai)
                            const midShoulderY = (leftShoulder.y + rightShoulder.y) / 2;
                            const normalizedDistance = Math.abs(nose.y - midShoulderY) / shoulderWidth;

                            // 2. Chỉ số Lệch Vai (Độ chênh lệch Y giữa 2 vai)
                            const shoulderTilt = Math.abs(leftShoulder.y - rightShoulder.y);

                            // Thu mẫu calibrate (Giữ nguyên code cũ)
                            if (isPopupCalibrating) {
                                popupCalibrationSamples.push(normalizedDistance);
                            }
                                const calibrationStatus = localStorage.getItem('calibrationStatus');
                                if (calibrationStatus === 'START') {
                                    let samples = JSON.parse(localStorage.getItem('calibrationData') || '[]');
                                    if (samples.length < 200) {
                                        samples.push(normalizedDistance);
                                        localStorage.setItem('calibrationData', JSON.stringify(samples));
                                    }
                                }

                            // DEBUG: Hiển thị cả 2 thông số lên màn hình để dễ test
                            debugText.innerText = `Cúi: ${normalizedDistance.toFixed(3)} (Ngưỡng: ${currentThreshold}) | Lệch vai: ${shoulderTilt.toFixed(3)}`;

                            // ------------------------------------------------
                            // PHÁN ĐOÁN VÀ BẤM GIỜ
                            // ------------------------------------------------
                            const isLechVai = shoulderTilt > 0.08;
                            const isSaiTuThe = normalizedDistance < currentThreshold;

                            if (isLechVai || isSaiTuThe) {
                                // Xác định loại lỗi ưu tiên hiển thị (Ưu tiên Lệch vai nếu bị cả 2)
                                const warningType = isLechVai ? 'LECH_VAI' : 'SAI_TU_THE';
                                const warningText = isLechVai ? "⚠️ BẠN ĐANG NGỒI LỆCH VAI!" : "⚠️ BẠN ĐANG SAI TƯ THẾ!";
                                const warningValue = isLechVai ? shoulderTilt : normalizedDistance;

                                statusBoard.innerText = warningText;
                                statusBoard.className = "bad";

                                // Bắt đầu bấm giờ vi phạm
                                if (slouchStartTime === null) {
                                    slouchStartTime = Date.now();
                                } else {
                                    const slouchDuration = (Date.now() - slouchStartTime) / 1000;
                                    debugText.innerText += ` | Liên tục: ${slouchDuration.toFixed(1)}s`;

                                    // Gọi hàm cảnh báo mới (Đã truyền thêm tham số warningType)
                                    triggerPostureWarning(warningType, slouchDuration, warningValue);
                                }
                            } else {
                                // Nếu ngồi đẹp lại thì reset mọi thứ
                                resetPostureStatus();
                            }
                        }
                    }
                    canvasCtx.restore();
                });
            }
            window.requestAnimationFrame(predictWebcam);
        }

        createPoseLandmarker();
    </script>

    <script>
        const { ipcRenderer } = require('electron');
        ipcRenderer.on('logout-command', () => {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
            console.log("Đã đăng xuất thành công!");
        });
    </script>

</body>

</html>
