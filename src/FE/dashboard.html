<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Cáo Thống Kê Tư Thế</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 0;
            color: #1f2937;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 10px;
        }

        .stat-box {
            display: flex;
            gap: 20px;
        }

        .stat-item {
            flex: 1;
            background: #eff6ff;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #bfdbfe;
        }

        .stat-item span {
            display: block;
            font-size: 24px;
            font-weight: bold;
            color: #2563eb;
            margin-top: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            background-color: #f9fafb;
            font-weight: 600;
            color: #4b5563;
        }

        tr:hover {
            background-color: #f9fafb;
        }

        .badge {
            background: #fee2e2;
            color: #ef4444;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h2>📊 Báo Cáo Trong Ngày</h2>
            <div class="stat-box">
                <div class="stat-item">
                    Số lần vi phạm
                    <span id="totalWarnings">0</span>
                </div>
                <div class="stat-item">
                    Tổng thời gian gù lưng
                    <span id="totalDuration">0s</span>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>🕒 Lịch Sử Cảnh Báo (20 lần gần nhất)</h2>
            <table>
                <thead>
                    <tr>
                        <th>Thời Gian</th>
                        <th>Loại Cảnh Báo</th>
                        <th>Thời Lượng</th>
                    </tr>
                </thead>
                <tbody id="logTableBody">
                    <tr>
                        <td colspan="3" style="text-align: center;">Đang tải dữ liệu...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        // Bọc toàn bộ logic vào sự kiện khi trang đã tải xong
        document.addEventListener('DOMContentLoaded', async () => {

            // 1. Lấy thông tin user hiện tại
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));

            // KIỂM TRA ĐĂNG NHẬP
            if (!currentUser || !currentUser.id) {
                alert("Phiên làm việc hết hạn, vui lòng đăng nhập lại!");
                window.close();
                return; // Dừng thực thi các lệnh phía dưới
            }

            const userId = currentUser.id;

            try {
                // 2. Gọi API Local lấy thống kê hôm nay
                const statsResponse = await ipcRenderer.invoke('api-get-today-stats', userId);

                if (statsResponse.success) {
                    const statsData = statsResponse.data;
                    // Chú ý: Map lại tên biến cho khớp với kết quả trả về từ SQLite
                    document.getElementById('totalWarnings').innerText = statsData.logCount;
                    document.getElementById('totalDuration').innerText = statsData.totalDuration + 's';
                }

                // 3. Gọi API Local lấy danh sách 20 lần gần nhất
                const recentResponse = await ipcRenderer.invoke('api-get-recent-logs', userId);
                const tbody = document.getElementById('logTableBody');

                if (!tbody) return;
                tbody.innerHTML = ''; // Xóa dữ liệu cũ

                if (recentResponse.success) {
                    const logs = recentResponse.data;

                    logs.forEach(log => {
                        // SQLite lưu thời gian dạng UTC, thêm 'Z' để Javascript hiểu đúng múi giờ
                        const dateObj = new Date(log.created_at + 'Z');
                        const timeString = dateObj.toLocaleTimeString('vi-VN');
                        const dateString = dateObj.toLocaleDateString('vi-VN');

                        const typeText = log.warning_type === 'GU_LUNG' ? 'Gù Lưng' : log.warning_type;

                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                        <td><strong>${timeString}</strong> - ${dateString}</td>
                        <td><span class="badge">${typeText}</span></td>
                        <td>${log.duration_seconds} giây</td>
                    `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = `<tr><td colspan="3" style="color:red; text-align:center;">${recentResponse.message}</td></tr>`;
                }

            } catch (err) {
                console.error("Lỗi giao tiếp hệ thống Local:", err);
                const tbody = document.getElementById('logTableBody');
                if (tbody) {
                    tbody.innerHTML = '<tr><td colspan="3" style="color:red; text-align:center;">Lỗi truy xuất CSDL cục bộ!</td></tr>';
                }
            }
        });
    </script>
</body>

</html>
